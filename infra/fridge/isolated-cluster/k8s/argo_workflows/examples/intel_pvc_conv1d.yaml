apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: intel-conv1d
  namespace: argo-workflows
spec:
  entrypoint: intel-conv1d
  securityContext:
    supplementalGroups:
      - 110
  templates:
    - name: intel-conv1d
      container:
        resources:
          limits:
            gpu.intel.com/i915: 1
        image: intel/intel-extension-for-pytorch:2.8.10-xpu
        command: ["bash", "-c"]
        args:
          - |
            echo "Checking GPU devices"
            ls -l /dev/dri || true

            echo "Running PyTorch GPU test"
            python3 -c "
            import time
            import torch
            import torch.nn as nn
            print('XPU available:', torch.xpu.is_available())
            print('XPU count:', torch.xpu.device_count())

            device = torch.device('xpu')
            conv = nn.Conv1d(512, 512, kernel_size=3, padding=1).to(device)
            x = torch.randn(32, 512, 2048, device=device)

            # Warmup
            for _ in range(10):
                y = conv(x)
            torch.xpu.synchronize()

            start = time.time()
            for _ in range(50):
                y = conv(x)
            torch.xpu.synchronize()
            end = time.time()

            print('50 conv1d ops took:', end - start, 'seconds')
            print('Average per conv:', (end - start) / 50, 'seconds')"
  serviceAccountName: argo-workflow
