apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: intel-resnet50-ddp
  namespace: argo-workflows
spec:
  entrypoint: intel-resnet50-ddp
  securityContext:
    supplementalGroups:
      - 110
  templates:
    - name: intel-resnet50-ddp
      container:
        resources:
          limits:
            gpu.intel.com/i915: 1
        image: intel/intel-extension-for-pytorch:2.8.10-xpu
        command: ["bash", "-c"]
        args:
          - |
            echo "Checking GPU devices"
            ls -l /dev/dri || true

            cat << 'EOF' > /tmp/resnet50_ddp.py
            import os
            import time
            import torch
            import torch.nn as nn
            import torch.optim as optim
            import torch.distributed as dist
            import torchvision.models as models
            import oneccl_bindings_for_pytorch
            from torch.nn.parallel import DistributedDataParallel as DDP

            def main():
                rank = int(os.environ['LOCAL_RANK'])
                world_size = int(os.environ['WORLD_SIZE'])

                dist.init_process_group(backend='ccl', init_method='env://', world_size=world_size, rank=rank)

                device = torch.device(f'xpu:{rank}')
                torch.xpu.set_device(device)

                if rank == 0:
                    print('XPU available:', torch.xpu.is_available())
                    print('XPU count:', torch.xpu.device_count())

                # Synthetic ImageNet-style data
                batch_size = 128
                num_batches = 200
                x = torch.randn(batch_size, 3, 224, 224, device=device)
                y = torch.randint(0, 1000, (batch_size,), device=device)

                model = models.resnet50().to(device)
                model = DDP(model, device_ids=[rank], output_device=rank)
                criterion = nn.CrossEntropyLoss()
                optimizer = optim.SGD(model.parameters(), lr=0.01, momentum=0.9)

                if rank == 0:
                    print('Warming up JIT...')
                model.train()
                for _ in range(3):
                    optimizer.zero_grad()
                    with torch.amp.autocast('xpu', dtype=torch.bfloat16):
                        outputs = model(x)
                        loss = criterion(outputs, y)
                    loss.backward()
                    optimizer.step()
                torch.xpu.synchronize()

                dist.barrier()
                if rank == 0:
                    print(f'Beginning benchmark: {num_batches} batches of {batch_size} images per tile (224x224, synthetic ImageNet)')
                    print(f'Effective batch size across both tiles: {batch_size * world_size}')
                start = time.time()

                for i in range(num_batches):
                    optimizer.zero_grad()
                    with torch.amp.autocast('xpu', dtype=torch.bfloat16):
                        outputs = model(x)
                        loss = criterion(outputs, y)
                    loss.backward()
                    optimizer.step()

                    if rank == 0 and i % 10 == 0:
                        print(f'Batch {i}/{num_batches}, Loss {loss.item():.4f}')

                torch.xpu.synchronize()
                end = time.time()

                if rank == 0:
                    elapsed = end - start
                    total_images = batch_size * world_size * num_batches
                    print(f'Benchmark complete')
                    print(f'Total time: {elapsed:.3f} seconds')
                    print(f'Images/sec (combined): {total_images / elapsed:.1f}')
                    print(f'Avg batch time: {elapsed / num_batches * 1000:.2f} ms')

                dist.destroy_process_group()

            if __name__ == '__main__':
                main()
            EOF

            echo "Running ResNet-50 DDP benchmark across 2 XPU tiles"
            torchrun --nproc_per_node=2 --master_addr=127.0.0.1 --master_port=29500 /tmp/resnet50_ddp.py
  serviceAccountName: argo-workflow
