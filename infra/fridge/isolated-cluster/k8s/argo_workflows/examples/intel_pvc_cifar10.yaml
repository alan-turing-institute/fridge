apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: intel-cifar10
  namespace: argo-workflows
spec:
  entrypoint: intel-cifar10
  securityContext:
    supplementalGroups:
      - 110
  templates:
    - name: intel-cifar10
      container:
        volumeMounts:
        - name: block-storage
          mountPath: /mnt/block-storage/
        resources:
          limits:
            gpu.intel.com/i915: 1
        image: intel/intel-extension-for-pytorch:2.8.10-xpu
        command: ["bash", "-c"]
        args:
          - |
            echo "Extracting CIFAR-10 to /tmp/cifar10"
            mkdir -p /tmp/cifar10
            tar -xzf /mnt/block-storage/cifar-10-python.tar.gz -C /tmp/cifar10

            echo "Running PyTorch GPU test: CIFAR-10"
            python3 -c "
            import time
            import torch
            import torch.nn as nn
            import torch.optim as optim
            import torchvision
            import torchvision.transforms as transforms
            print('XPU available:', torch.xpu.is_available())
            print('XPU count:', torch.xpu.device_count())

            device = torch.device('xpu')
            # CIFAR-10 transforms
            transform = transforms.Compose([
                transforms.ToTensor(),
                transforms.Normalize((0.5,), (0.5,))
            ])

            # Load dataset from extracted directory
            trainset = torchvision.datasets.CIFAR10(
                root='/tmp/cifar10',
                train=True,
                download=False,
                transform=transform
            )
            trainloader = torch.utils.data.DataLoader(trainset, batch_size=256, shuffle=True, num_workers=4)

            # Simple CNN
            class SmallCNN(nn.Module):
                def __init__(self):
                    super().__init__()
                    self.conv1 = nn.Conv2d(3, 32, 3, padding=1)
                    self.conv2 = nn.Conv2d(32, 64, 3, padding=1)
                    self.pool = nn.MaxPool2d(2, 2)
                    self.fc1 = nn.Linear(64 * 8 * 8, 256)
                    self.fc2 = nn.Linear(256, 10)

                def forward(self, x):
                    x = self.pool(torch.relu(self.conv1(x)))
                    x = self.pool(torch.relu(self.conv2(x)))
                    x = x.view(-1, 64 * 8 * 8)
                    x = torch.relu(self.fc1(x))
                    return self.fc2(x)

            model = SmallCNN().to(device)
            criterion = nn.CrossEntropyLoss()
            optimizer = optim.Adam(model.parameters(), lr=0.001)

            print('Warming up JIT...')
            warmup_inputs, warmup_labels = next(iter(trainloader))
            warmup_inputs, warmup_labels = warmup_inputs.to(device), warmup_labels.to(device)
            for _ in range(3):
                optimizer.zero_grad()
                outputs = model(warmup_inputs)
                loss = criterion(outputs, warmup_labels)
                loss.backward()
                optimizer.step()
            torch.xpu.synchronize()

            print('Beginning benchmark training epoch...')
            start = time.time()

            for i, (inputs, labels) in enumerate(trainloader):
                inputs, labels = inputs.to(device), labels.to(device)

                optimizer.zero_grad()
                outputs = model(inputs)
                loss = criterion(outputs, labels)
                loss.backward()
                optimizer.step()

                if i % 100 == 0:
                    _, predicted = outputs.max(1)
                    acc = predicted.eq(labels).sum().item() / labels.size(0)
                    print(f'Batch {i}, Loss {loss.item():.4f}, Batch Acc {acc:.2%}')

            torch.xpu.synchronize() if device.type == 'xpu' else None
            end = time.time()

            print('Training epoch time:', end - start, 'seconds')
            print('Images/sec:', len(trainset) / (end - start))
            print(f'Final batch loss: {loss.item():.4f}')"
  volumes:
    - name: block-storage
      persistentVolumeClaim:
        claimName: block-storage-pvc
  serviceAccountName: argo-workflow
